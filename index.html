<title>이셰프의 스시 사천성</title>
<style>
/* ── reset ── */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#0e0a06}

/* ── 루트 센터링 ── */
#root{display:flex;justify-content:center;align-items:center;width:100%;height:100%}

/* ── 게임 컨테이너 ── */
#game{
  position:relative;width:430px;height:680px;
  overflow:hidden;border-radius:0;
  font-family:'Hiragino Mincho ProN','Yu Mincho','Noto Serif KR',Georgia,serif;
}
#bg{position:absolute;inset:0;background-size:cover;background-position:center}

/* ── HUD ── */
#hud{
  position:absolute;top:0;left:0;right:0;z-index:10;
  padding:12px 16px 10px;
  background:linear-gradient(to bottom,rgba(14,10,6,.72) 60%,transparent);
}
#game-title{
  font-size:15px;font-weight:400;
  color:rgba(240,228,200,.9);
  letter-spacing:3px;text-align:center;
  margin-bottom:10px;
  /* 오마카세 메뉴판 느낌: 텍스트 이펙트 없음 */
}
#hud-row{display:flex;align-items:center;gap:10px}

/* 남은 쌍 */
#pairs-badge{
  display:flex;flex-direction:column;align-items:center;
  flex-shrink:0;
  padding:4px 10px;
  border-right:1px solid rgba(200,170,110,.25);
}
#pairs-badge .lbl{font-size:9px;color:rgba(200,170,110,.7);letter-spacing:2px;margin-bottom:2px}
#pairs-num{font-size:22px;font-weight:300;color:rgba(240,228,200,.95);line-height:1}

/* 타이머 */
#timer-wrap{flex:1}
#timer-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px}
#timer-top .lbl{font-size:9px;color:rgba(200,170,110,.7);letter-spacing:2px}
#timer-text{font-size:13px;font-weight:400;color:rgba(240,228,200,.9);font-variant-numeric:tabular-nums}
#tbar-bg{
  width:100%;height:2px;
  background:rgba(255,255,255,.12);
}
#tbar{
  height:100%;
  background:rgba(200,170,110,.8);
  transition:width .9s linear,background .6s;
}

/* ── 보드 ── */
#board-wrap{
  position:absolute;top:74px;left:0;right:0;bottom:0;
  display:flex;align-items:center;justify-content:center;
}
#board{position:relative}

/* ── 타일 ── */
.tile{
  position:absolute;border-radius:8px;cursor:pointer;user-select:none;
  transition:transform .12s ease,opacity .12s;
  /* 히노키 나무 질감 느낌의 테두리 */
  box-shadow:
    0 1px 0 rgba(255,255,255,.22) inset,
    0 -1px 0 rgba(0,0,0,.25) inset,
    0 3px 8px rgba(0,0,0,.4);
}
.tile img{width:100%;height:100%;border-radius:7px;display:block;pointer-events:none;object-fit:cover;transform:scale(1.18);transition:transform .12s}
.tile:hover{transform:scale(1.04)}
.tile.sel{
  transform:scale(1.08);
  box-shadow:
    0 0 0 2px rgba(200,170,110,.9),
    0 6px 20px rgba(0,0,0,.5)!important;
  z-index:9!important;
}
/* 오매칭 shake */
.tile.shake{animation:shake .38s ease}
@keyframes shake{
  0%,100%{transform:translateX(0)}
  18%{transform:translateX(-6px)}
  36%{transform:translateX(5px)}
  54%{transform:translateX(-4px)}
  72%{transform:translateX(3px)}
}
/* 매칭 성공 */
.tile.gone{animation:fadeOut .35s ease forwards}
@keyframes fadeOut{
  0%  {transform:scale(1.15);opacity:1;filter:brightness(1)}
  30% {transform:scale(1.35);opacity:1;filter:brightness(2.5) saturate(1.8)}
  70% {transform:scale(1.1); opacity:.6;filter:brightness(1.8)}
  100%{transform:scale(.5); opacity:0;filter:brightness(1)}
}
@keyframes boardFlash{
  0%  {filter:brightness(1)}
  20% {filter:brightness(1.35)}
  100%{filter:brightness(1)}
}
.board-flash{animation:boardFlash .3s ease}
  100%{transform:scale(.7);opacity:0}
}

/* 연결선 캔버스 */
#line-cv{position:absolute;inset:0;pointer-events:none;z-index:20}

/* 파티클 */
.ptcl{
  position:absolute;pointer-events:none;z-index:30;
  font-size:18px;animation:rise .7s ease forwards;
}
@keyframes rise{
  from{transform:translateY(0) scale(1);opacity:.9}
  to{transform:translateY(-55px) scale(.1);opacity:0}
}

/* ── 오버레이 공통 ── */
.ov{
  position:absolute;inset:0;z-index:50;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.ov.hide{display:none}

/* ── 타이틀 화면 ── */
#s-title{background:rgba(10,7,3,.88)}
#s-title .inner{
  display:flex;flex-direction:column;align-items:center;
  padding:48px 40px;
  width:310px;
  border:1px solid rgba(200,170,110,.2);
  background:rgba(20,14,8,.6);
}
/* 타이틀: 세로쓰기 느낌의 두 줄 레이아웃 */
#s-title .title-top{
  font-size:11px;letter-spacing:4px;
  color:rgba(180,150,90,.7);
  margin-bottom:18px;
  text-transform:uppercase;
  font-family:'Hiragino Kaku Gothic Pro','Noto Sans KR',sans-serif;
  font-weight:300;
}
#s-title .title-main{
  font-size:28px;font-weight:500;
  color:rgba(240,228,200,1);
  letter-spacing:2px;
  line-height:1.45;
  text-align:center;
  margin-bottom:4px;
  /* 이펙트 없음 — 글자 자체로 승부 */
}
#s-title .title-sub{
  font-size:11px;letter-spacing:5px;
  color:rgba(180,150,90,.55);
  margin-bottom:32px;
  font-family:'Hiragino Kaku Gothic Pro','Noto Sans KR',sans-serif;
  font-weight:300;
}
#s-title .chef-wrap{width:130px;margin-bottom:32px}
#s-title .chef-wrap img{width:100%}
/* 구분선 */
.rule{width:40px;height:1px;background:rgba(200,170,110,.35);margin:0 auto 28px}

/* ── 버튼 ── */
.btn{
  background:transparent;
  color:rgba(240,228,200,.9);
  border:1px solid rgba(200,170,110,.5);
  border-radius:2px;          /* 각진 버튼 — 오마카세 메뉴 느낌 */
  padding:12px 44px;
  font-size:14px;
  font-weight:400;
  letter-spacing:3px;
  cursor:pointer;
  font-family:'Hiragino Kaku Gothic Pro','Noto Sans KR',sans-serif;
  transition:background .2s, color .2s, border-color .2s;
}
.btn:hover{
  background:rgba(200,170,110,.12);
  border-color:rgba(200,170,110,.8);
  color:rgba(240,228,200,1);
}
.btn:active{transform:scale(.98)}

/* ── 클리어 화면 ── */
#s-clear{background:rgba(8,5,2,.88)}
#s-clear .inner{
  display:flex;flex-direction:column;align-items:center;
  padding:44px 40px;width:310px;
  border:1px solid rgba(200,170,110,.2);
  background:rgba(20,14,8,.65);
}
#s-clear .result-eyebrow{
  font-size:10px;letter-spacing:4px;
  color:rgba(180,150,90,.6);
  margin-bottom:20px;
  font-family:'Hiragino Kaku Gothic Pro',sans-serif;
  font-weight:300;text-transform:uppercase;
}
#s-clear .result-title{
  font-size:22px;font-weight:400;
  color:rgba(240,228,200,.95);
  letter-spacing:1px;
  margin-bottom:12px;text-align:center;
}
#s-clear .result-msg{
  font-size:12px;color:rgba(190,170,130,.75);
  line-height:2;margin-bottom:28px;
  text-align:center;letter-spacing:1px;
  font-family:'Hiragino Kaku Gothic Pro',sans-serif;
  font-weight:300;
}
#s-clear .chef-img{width:120px;display:block;margin:0 auto 24px}

/* ── 게임오버 화면 ── */
#s-over{background:rgba(4,4,10,.9)}
#s-over .inner{
  display:flex;flex-direction:column;align-items:center;
  padding:28px 32px;width:310px;
  border:1px solid rgba(100,100,140,.2);
  background:rgba(8,8,18,.65);
}
#s-over .result-eyebrow{
  font-size:10px;letter-spacing:4px;
  color:rgba(120,120,160,.7);
  margin-bottom:20px;
  font-family:'Hiragino Kaku Gothic Pro',sans-serif;
  font-weight:300;text-transform:uppercase;
}
#s-over .result-title{
  font-size:20px;font-weight:400;
  color:rgba(180,180,210,.9);
  letter-spacing:2px;
  margin-bottom:12px;text-align:center;
}
#s-over .result-msg{
  font-size:12px;color:rgba(120,120,160,.7);
  line-height:2;margin-bottom:24px;
  text-align:center;letter-spacing:1px;
  font-family:'Hiragino Kaku Gothic Pro',sans-serif;
  font-weight:300;
}
#s-over .closed-img{width:160px;height:auto;display:block;margin:0 auto 8px}
#s-over .chef-img{width:80px;display:block;margin:0 auto 20px}
/* 게임오버 버튼 — 차가운 톤 */
#s-over .btn{
  border-color:rgba(120,120,160,.4);
  color:rgba(180,180,210,.8);
}
#s-over .btn:hover{
  background:rgba(120,120,160,.1);
  border-color:rgba(160,160,200,.7);
}
</style>
</head>
<body>
<div id="root"><div id="game">
  <div id="bg"></div>

  <!-- HUD -->
  <div id="hud">
    <div style="display:flex;align-items:center;justify-content:center;position:relative">
      <div id="game-title">이셰프의 스시 사천성</div>
      <button onclick="confirmRestart()" id="restart-btn"
        style="position:absolute;right:0;background:transparent;border:1px solid rgba(200,170,110,.3);
        border-radius:2px;padding:3px 8px;color:rgba(200,170,110,.6);font-size:10px;
        letter-spacing:1px;cursor:pointer;font-family:sans-serif;display:none;
        z-index:20;-webkit-tap-highlight-color:rgba(0,0,0,0)">
        재시작
      </button>
    </div>
    <div id="hud-row">
      <div id="pairs-badge">
        <span class="lbl">PAIRS</span>
        <span id="pairs-num">36</span>
      </div>
      <div id="timer-wrap">
        <div id="timer-top">
          <span class="lbl">TIME</span>
          <span id="timer-text">3:00</span>
        </div>
        <div id="tbar-bg"><div id="tbar" style="width:100%"></div></div>
      </div>
    </div>
  </div>

  <!-- 보드 -->
  <div id="board-wrap"><div id="board"><canvas id="line-cv"></canvas></div></div>

  <!-- 섞기 버튼 -->
  <div id="shuffle-wrap" style="display:none;position:absolute;bottom:90px;left:50%;transform:translateX(-50%);z-index:40;text-align:center">
    <div style="font-size:11px;color:rgba(200,170,110,.6);letter-spacing:2px;margin-bottom:8px;font-family:sans-serif">더 이상 맞출 수 있는 패가 없습니다</div>
    <button onclick="shuffleBoard()" 
      style="background:rgba(20,14,8,.85);border:1px solid rgba(200,170,110,.5);border-radius:2px;
      padding:12px 36px;color:rgba(240,228,200,.9);font-size:14px;letter-spacing:3px;
      cursor:pointer;font-family:inherit;backdrop-filter:blur(4px)">
      패 섞기
    </button>
  </div>

  <!-- 타이틀 -->
  <div class="ov" id="s-title">
    <div class="inner">
      <div class="title-top">Chef Lee's</div>
      <div class="title-main">이셰프의<br>스시 사천성</div>
      <div class="title-sub">Sushi Shisen</div>
      <div class="rule"></div>
      <div class="chef-wrap"><img id="i-title-chef" src=""></div>
      <button class="btn" onclick="startGame()">영업 시작</button>
      <button onclick="showScoreboardOnly()"
        style="background:transparent;border:none;color:rgba(200,170,110,.5);
        font-size:11px;letter-spacing:2px;cursor:pointer;margin-top:14px;
        font-family:sans-serif;font-weight:300;text-decoration:underline;
        text-underline-offset:3px;padding:4px">
        기록 보기
      </button>
    </div>
  </div>

  <!-- 클리어 -->
  <div class="ov hide" id="s-clear">
    <div class="inner" style="max-width:340px;width:92%;max-height:88vh;overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(200,170,110,.3) transparent">
      <div class="result-eyebrow">Clear</div>
      <img class="chef-img" id="i-clear-chef" src="">
      <div class="result-title">맛있는 스시가<br>완성되었습니다</div>
      <div class="rule"></div>
      <div class="result-msg" id="clear-msg"></div>
      <!-- 이름 입력 -->
      <div id="name-section" style="width:100%;margin-bottom:18px">
        <div style="font-size:10px;color:rgba(180,150,90,.6);letter-spacing:3px;margin-bottom:8px;font-family:sans-serif">YOUR NAME</div>
        <input id="player-name" type="text" maxlength="12" placeholder="이름을 입력하세요"
          style="width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(200,170,110,.3);
          border-radius:2px;padding:10px 12px;color:rgba(240,228,200,.9);font-size:14px;
          letter-spacing:1px;outline:none;font-family:inherit;text-align:center">
        <div style="display:flex;gap:8px;margin-top:10px">
          <button class="btn" onclick="submitScore()" style="flex:1;padding:11px;font-size:13px">기록 등록</button>
          <button class="btn" onclick="showScoreboard(false)" style="flex:1;padding:11px;font-size:13px;border-color:rgba(200,170,110,.25);color:rgba(200,170,110,.6)">순위 보기</button>
        </div>
        <button class="btn" onclick="startGame()" style="width:100%;margin-top:8px;padding:10px;font-size:12px;border-color:rgba(200,170,110,.18);color:rgba(200,170,110,.45);letter-spacing:2px">다시하기</button>
      </div>
      <!-- 스코어보드 -->
      <div id="scoreboard-section" style="width:100%;display:none">
        <div style="font-size:10px;color:rgba(180,150,90,.6);letter-spacing:3px;margin-bottom:10px;font-family:sans-serif;text-align:center">BEST RECORDS</div>
        <div id="score-list" style="width:100%;margin-bottom:16px;max-height:150px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(200,170,110,.3) transparent"></div>
        <button class="btn" onclick="startGame()" style="width:100%">다시하기</button>
        <button id="clear-back-btn" onclick="show('s-title')"
          style="display:none;background:transparent;border:none;color:rgba(200,170,110,.45);
          font-size:11px;letter-spacing:2px;cursor:pointer;margin-top:10px;width:100%;
          font-family:sans-serif;font-weight:300;padding:4px">
          닫기
        </button>
      </div>
    </div>
  </div>

  <!-- 게임오버 -->
  <div class="ov hide" id="s-over">
    <div class="inner">
      <div class="result-eyebrow">Time Over</div>
      <img class="closed-img" id="i-closed" src="">
      <img class="chef-img" id="i-sorry" src="">
      <div class="result-title">영업 시간 종료</div>
      <div class="result-msg">시간이 다 됐습니다.<br>다음엔 더 빠르게 도전해보세요.</div>
      <button class="btn" onclick="startGame()">다시하기</button>
    </div>
  </div>
</div></div>

// ─── 상수 ───────────────────────────────
const TILE_KEYS=['tuna','uni','ikura','tamago','anago','amaebi','aji','scallop','montblanc','kohada','shiromi'];
const TILE_NAME=['참치','우니','이쿠라','타마고','아나고','아마에비','전갱이','가리비','몽블랑','전어','흰살'];
const COLS=8, ROWS=9;
const TW=46, TH=46, GAP=3, CELL=TW+GAP;
const TOTAL=90;

// ─── 상태 ───────────────────────────────
let tiles=[], selTile=null, timeLeft=TOTAL, timerID=null, active=false;

// ─── 이미지 프리로드 ─────────────────────
function preload(){
  return new Promise(res=>{
    let n=0;
    TILE_KEYS.forEach(k=>{
      const img=new Image();
      img.onload=img.onerror=()=>{if(++n===TILE_KEYS.length)res();};
      img.src=IMG[k];
    });
  });
}

// ─── 초기 UI ────────────────────────────
function initUI(){
  document.getElementById('bg').style.backgroundImage=`url(${IMG.bg_vertical})`;
  document.getElementById('i-title-chef').src=IMG.chef_serve;
  document.getElementById('i-clear-chef').src=IMG.chef_serve;
  document.getElementById('i-sorry').src=IMG.chef_sorry;
  document.getElementById('i-closed').src=IMG.closed_sign;
}

// ─── 보드 생성 ────────────────────────────
function buildBoard(){
  const board=document.getElementById('board');
  board.querySelectorAll('.tile').forEach(e=>e.remove());
  tiles=[];
  const bw=COLS*CELL-GAP, bh=ROWS*CELL-GAP;
  board.style.width=bw+'px'; board.style.height=bh+'px';
  const cv=document.getElementById('line-cv');
  cv.width=bw; cv.height=bh;

  // 11종, 72칸(36쌍): 앞 8종×3쌍(6개) + 뒤 3종×4쌍(8개) = 48+24=72
  let pool=[];
  for(let t=0;t<8;t++) for(let p=0;p<6;p++) pool.push(t);   // 3쌍씩
  for(let t=8;t<11;t++) for(let p=0;p<8;p++) pool.push(t);  // 4쌍씩
  for(let i=pool.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [pool[i],pool[j]]=[pool[j],pool[i]];
  }
  let idx=0;
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const t=makeTile(idx,pool[idx],c,r);
    tiles.push(t); board.appendChild(t.el); idx++;
  }
  updatePairs();
}

function makeTile(id,type,col,row){
  const el=document.createElement('div');
  el.className='tile';
  el.style.cssText=`width:${TW}px;height:${TH}px;left:${col*CELL}px;top:${row*CELL}px;z-index:1`;
  const img=document.createElement('img');
  img.src=IMG[TILE_KEYS[type]]; img.alt=TILE_NAME[type];
  el.appendChild(img);
  const tile={id,type,col,row,el,matched:false};
  el.addEventListener('click',()=>onTile(tile));
  return tile;
}

// ─── 클릭 ───────────────────────────────
function onTile(tile){
  if(!active||tile.matched) return;

  // 같은 타일 재클릭 → 선택 해제
  if(selTile===tile){
    tile.el.classList.remove('sel');
    selTile=null; return;
  }
  // 첫 선택
  if(!selTile){
    selTile=tile; tile.el.classList.add('sel'); return;
  }
  // 타입 불일치 → 오매칭 shake
  if(selTile.type!==tile.type){
    doShake(selTile); doShake(tile);
    selTile.el.classList.remove('sel');
    selTile=null; return;
  }
  // 같은 타입 → 경로 탐색
  const path=findPath(selTile,tile);
  if(!path){
    // 경로 없음 → shake 두 타일
    doShake(selTile); doShake(tile);
    selTile.el.classList.remove('sel');
    selTile=tile; tile.el.classList.add('sel'); return;
  }
  // 매칭 성공
  drawPath(path);
  const a=selTile, b=tile;
  a.el.classList.remove('sel');
  selTile=null;
  setTimeout(()=>{
    a.matched=b.matched=true;
    a.el.classList.add('gone'); b.el.classList.add('gone');
    spawnPtcl(a); spawnPtcl(b);
    const bd=document.getElementById('board');
    bd.classList.remove('board-flash');
    void bd.offsetWidth;
    bd.classList.add('board-flash');
    setTimeout(()=>bd.classList.remove('board-flash'),300);
    setTimeout(()=>{
      a.el.style.visibility='hidden'; b.el.style.visibility='hidden';
      clearLine(); updatePairs(); checkWin(); if(active) checkAndShowDeadlock();
    },300);
  },55);
}

// shake 헬퍼
function doShake(tile){
  tile.el.classList.remove('shake');
  void tile.el.offsetWidth; // reflow
  tile.el.classList.add('shake');
  setTimeout(()=>tile.el.classList.remove('shake'), 400);
}

// ─── 사천성 경로 탐색 (꺾임 ≤ 2) ──────────
function buildGrid(){
  const G=[];
  for(let r=0;r<ROWS+2;r++){G[r]=[];for(let c=0;c<COLS+2;c++)G[r][c]=0;}
  tiles.forEach(t=>{ if(!t.matched) G[t.row+1][t.col+1]=1; });
  return G;
}

function findPath(a,b){
  const G=buildGrid();
  const R=ROWS+2, C=COLS+2;
  const sc=a.col+1, sr=a.row+1;
  const ec=b.col+1, er=b.row+1;
  G[sr][sc]=0; G[er][ec]=0;

  // BFS 상태: {c, r, dir(0=없음,1=우,2=좌,3=하,4=상), turns, parent}
  // vis[r][c][dir] = min turns 로 중복 방문 최적화
  const DIRS=[[1,0],[-1,0],[0,1],[0,-1]]; // 우,좌,하,상 → dir 1,2,3,4
  const INF=99;
  const vis=[];
  for(let r=0;r<R;r++){vis[r]=[];for(let c=0;c<C;c++)vis[r][c]=[INF,INF,INF,INF,INF];}

  const Q=[];
  // 초기: 4방향으로 시작 (꺾임=0)
  for(let d=0;d<4;d++){
    const [dc,dr]=DIRS[d];
    const nd=d+1;
    let nc=sc+dc, nr=sr+dr;
    while(nc>=0&&nc<C&&nr>=0&&nr<R){
      if(G[nr][nc]===1){
        // 도착 타일이면 즉시 성공
        if(nc===ec&&nr===er){
          return reconstructPath(null,sc,sr,nc,nr,[{c:sc,r:sr},{c:nc,r:nr}]);
        }
        break;
      }
      if(0<vis[nr][nc][nd]){
        vis[nr][nc][nd]=0;
        Q.push({c:nc,r:nr,dir:nd,turns:0,parent:{c:sc,r:sr,dir:0,turns:0,parent:null}});
      }
      nc+=dc; nr+=dr;
    }
  }

  while(Q.length){
    const cur=Q.shift();
    const {c:cc,r:cr,dir:cd,turns:ct}=cur;
    if(cc===ec&&cr===er) return buildPath(cur);

    for(let d=0;d<4;d++){
      const [dc,dr]=DIRS[d];
      const nd=d+1;
      // 반대방향 스킵 (불필요한 역행)
      if((cd===1&&nd===2)||(cd===2&&nd===1)||(cd===3&&nd===4)||(cd===4&&nd===3)) continue;
      const nt=ct+(nd!==cd?1:0);
      if(nt>2) continue;
      let nc=cc+dc, nr=cr+dr;
      while(nc>=0&&nc<C&&nr>=0&&nr<R){
        if(G[nr][nc]===1){
          if(nc===ec&&nr===er&&nt<vis[nr][nc][nd]){
            vis[nr][nc][nd]=nt;
            return buildPath({c:nc,r:nr,dir:nd,turns:nt,parent:cur});
          }
          break;
        }
        if(nt<vis[nr][nc][nd]){
          vis[nr][nc][nd]=nt;
          Q.push({c:nc,r:nr,dir:nd,turns:nt,parent:cur});
        }
        nc+=dc; nr+=dr;
      }
    }
  }
  return null;
}

function buildPath(node){
  const pts=[];
  let n=node;
  while(n){pts.unshift({c:n.c,r:n.r});n=n.parent;}
  return pts;
}
function reconstructPath(p,sc,sr,ec,er,fallback){return fallback;}

// ─── 연결선 ─────────────────────────────
let lineTO=null;
function drawPath(path){
  clearLine();
  const cv=document.getElementById('line-cv');
  const ctx=cv.getContext('2d');
  const pts=path.map(p=>({x:(p.c-1)*CELL+TW/2, y:(p.r-1)*CELL+TH/2}));

  ctx.strokeStyle='rgba(220,190,100,.3)';
  ctx.lineWidth=10; ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.shadowColor='rgba(0,0,0,0)'; ctx.shadowBlur=0;
  ctx.beginPath();
  pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
  ctx.stroke();

  ctx.strokeStyle='rgba(220,190,100,.6)';
  ctx.lineWidth=5;
  ctx.shadowColor='rgba(200,160,60,.8)'; ctx.shadowBlur=12;
  ctx.beginPath();
  pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
  ctx.stroke();

  ctx.strokeStyle='rgba(255,240,180,1)';
  ctx.lineWidth=2;
  ctx.shadowColor='rgba(255,240,200,1)'; ctx.shadowBlur=6;
  ctx.beginPath();
  pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
  ctx.stroke();

  if(lineTO) clearTimeout(lineTO);
  lineTO=setTimeout(clearLine, 320);
}

function clearLine(){
  const cv=document.getElementById('line-cv');
  cv.getContext('2d').clearRect(0,0,cv.width,cv.height);
}

// ─── 파티클 ─────────────────────────────
function spawnPtcl(t){
  const board=document.getElementById('board');
  const emojis=['✨','💫','⭐','🌸','🎊','⚡','🌟','🍣'];
  for(let i=0;i<3;i++){
    const e=document.createElement('div');
    e.className='ptcl';
    e.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    const ox=(Math.random()-.5)*28;
    const oy=(Math.random()-.5)*16;
    e.style.cssText=`left:${t.col*CELL+TW/2-10+ox}px;top:${t.row*CELL-2+oy}px;
      font-size:${14+Math.random()*10}px;
      animation-duration:${0.55+Math.random()*.35}s;
      animation-delay:${i*0.05}s`;
    board.appendChild(e);
    setTimeout(()=>e.remove(),900);
  }
}

// ─── UI ─────────────────────────────────
function updatePairs(){
  document.getElementById('pairs-num').textContent=
    Math.floor(tiles.filter(t=>!t.matched).length/2);
}
function updateTimer(){
  const m=Math.floor(timeLeft/60), s=timeLeft%60;
  document.getElementById('timer-text').textContent=m+':'+String(s).padStart(2,'0');
  const pct=timeLeft/TOTAL*100;
  const bar=document.getElementById('tbar');
  bar.style.width=pct+'%';
  // 타이머 바 색: 절반 이상=amber, 25~50=옅은 주황, 이하=붉은 amber
  bar.style.background=
    pct>50?'rgba(200,170,110,.8)':
    pct>25?'rgba(210,140,70,.85)':
           'rgba(190,70,60,.9)';
}
function show(id){
  ['s-title','s-clear','s-over'].forEach(s=>
    document.getElementById(s).classList.toggle('hide',s!==id));
}

// ─── 승패 ───────────────────────────────
function checkWin(){
  if(tiles.every(t=>t.matched)) end(true);
}
function end(win){
  active=false;
  if(timerID){clearInterval(timerID);timerID=null;}
  document.getElementById('restart-btn').style.display='none';
  document.getElementById('shuffle-wrap').style.display='none';
  if(win){
    const el=TOTAL-timeLeft, m=Math.floor(el/60), s=el%60;
    document.getElementById('clear-msg').innerHTML=
      m>0?`${m}분 ${s}초 만에 완성했습니다.`:`${s}초 만에 완성했습니다.`;
    // 이름 입력 초기화
    document.getElementById('player-name').value='';
    document.getElementById('player-name').style.borderColor='rgba(200,170,110,.3)';
    document.getElementById('i-clear-chef').style.display='block';
    document.querySelector('#s-clear .result-title').style.display='block';
    document.querySelector('#s-clear .rule').style.display='block';
    document.getElementById('name-section').style.display='block';
    document.getElementById('clear-back-btn').style.display='none';
    document.getElementById('scoreboard-section').style.display='none';
    show('s-clear');
  } else {
    show('s-over');
  }
}

// ─── 게임 시작 ───────────────────────────
function startGame(){
  ['s-title','s-clear','s-over'].forEach(s=>
    document.getElementById(s).classList.add('hide'));
  if(timerID){clearInterval(timerID);timerID=null;}
  timeLeft=TOTAL; selTile=null;
  updateTimer();
  document.getElementById('tbar').style.width='100%';
  buildBoard();
  active=true;
  document.getElementById('restart-btn').style.display='block';
  document.getElementById('shuffle-wrap').style.display='none';
  timerID=setInterval(()=>{
    timeLeft--;
    updateTimer();
    if(timeLeft<=0) end(false);
  },1000);
}

// ─── 부트 ───────────────────────────────
window.addEventListener('load',async()=>{
  await preload();
  initUI();
  show('s-title');
});


// ─── 타이틀에서 기록 보기 ──────────────────
async function showScoreboardOnly(){
  // 셰프/타이틀 숨기기
  document.getElementById('i-clear-chef').style.display='none';
  document.querySelector('#s-clear .result-title').style.display='none';
  document.querySelector('#s-clear .rule').style.display='none';
  // 기존 클리어 화면 재활용 — 셰프/타이틀/클리어 메시지 숨기고 스코어보드만
  document.getElementById('clear-msg').innerHTML='';
  document.getElementById('name-section').style.display='none';
  document.getElementById('scoreboard-section').style.display='block';
  show('s-clear');
  // 스코어보드 로드 (submitted=false → 하이라이트 없음)
  await showScoreboard(false);
  // 다시하기 버튼을 "닫기"로 교체
  document.getElementById('clear-back-btn').style.display='block';
}

// ─── 재시작 확인 ─────────────────────────
function confirmRestart(){
  // confirm이 차단되는 환경 대비 - 바로 재시작
  startGame();
}

// ─── 데드락 체크 ─────────────────────────
function checkDeadlock(){
  const remaining = tiles.filter(t=>!t.matched);
  // 같은 타입끼리 경로 있는지 확인
  for(let i=0;i<remaining.length;i++){
    for(let j=i+1;j<remaining.length;j++){
      if(remaining[i].type===remaining[j].type){
        const path=findPath(remaining[i],remaining[j]);
        if(path) return false; // 매칭 가능한 쌍 있음
      }
    }
  }
  return true; // 데드락
}

// ─── 섞기 ────────────────────────────────
function shuffleBoard(){
  document.getElementById('shuffle-wrap').style.display='none';
  const remaining=tiles.filter(t=>!t.matched);
  // 타입만 셔플
  const types=remaining.map(t=>t.type);
  for(let i=types.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [types[i],types[j]]=[types[j],types[i]];
  }
  remaining.forEach((t,i)=>{
    t.type=types[i];
    t.el.querySelector('img').src=IMG[TILE_KEYS[t.type]];
    t.el.querySelector('img').alt=TILE_NAME[t.type];
    // 잠깐 flash 효과
    t.el.style.opacity='0.4';
    setTimeout(()=>{ if(t.el) t.el.style.opacity='1'; },300);
  });
  setTimeout(()=>{ if(active) checkAndShowDeadlock(); },400);
}

function checkAndShowDeadlock(){
  if(checkDeadlock()){
    document.getElementById('shuffle-wrap').style.display='block';
  } else {
    document.getElementById('shuffle-wrap').style.display='none';
  }
}

async function sbFetch(path, options={}) {
  const res = await fetch(SB_URL + path, {
    ...options,
    headers: {
      'apikey': SB_KEY,
      'Authorization': 'Bearer ' + SB_KEY,
      'Content-Type': 'application/json',
      'Prefer': options.prefer || '',
      ...((options.headers)||{})
    }
  });
  if (!res.ok) throw new Error(await res.text());
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function submitScore() {
  const nameEl = document.getElementById('player-name');
  const name = nameEl.value.trim();
  if (!name) { nameEl.style.borderColor='rgba(190,70,60,.7)'; return; }

  const elapsed = TOTAL - timeLeft;
  try {
    await sbFetch('/rest/v1/scores', {
      method: 'POST',
      prefer: 'return=minimal',
      body: JSON.stringify({ name, time_sec: elapsed })
    });
    await showScoreboard();
  } catch(e) {
    console.error('점수 저장 실패:', e);
    // 실패해도 스코어보드는 보여줌
    await showScoreboard();
  }
}

async function showScoreboard(submitted=true) {
  document.getElementById('name-section').style.display = 'none';
  document.getElementById('scoreboard-section').style.display = 'block';

  const list = document.getElementById('score-list');
  list.innerHTML = '<div style="text-align:center;color:rgba(180,150,90,.5);font-size:12px;padding:8px">불러오는 중...</div>';

  try {
    const data = await sbFetch('/rest/v1/scores?select=name,time_sec&order=time_sec.asc&limit=10');
    if (!data || data.length === 0) {
      list.innerHTML = '<div style="text-align:center;color:rgba(180,150,90,.4);font-size:12px;padding:8px">아직 기록이 없습니다</div>';
      return;
    }
    list.innerHTML = data.map((row, i) => {
      const m = Math.floor(row.time_sec/60), s = row.time_sec%60;
      const time = m > 0 ? m+'분 '+s+'초' : s+'초';
      const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
      const isMe = submitted && row.name === (document.getElementById('player-name').value.trim());
      return `<div style="display:flex;justify-content:space-between;align-items:center;
        padding:7px 4px;border-bottom:1px solid rgba(200,170,110,.1);
        ${isMe?'color:rgba(240,228,200,1)':'color:rgba(180,160,120,.75)'}">
        <span style="font-size:12px;font-family:sans-serif;font-weight:300;letter-spacing:.5px">
          ${medal} ${i+1}. ${row.name}</span>
        <span style="font-size:13px;letter-spacing:.5px">${time}</span>
      </div>`;
    }).join('');
  } catch(e) {
    list.innerHTML = '<div style="text-align:center;color:rgba(180,150,90,.4);font-size:12px;padding:8px">기록을 불러올 수 없습니다</div>';
  }
}
